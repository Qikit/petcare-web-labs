{% extends 'base.html' %}

{% block title %}Удалить питомца — PetCare{% endblock %}

{% block content %}
<section class="section">
    <div class="form-section">
        <h2>Удалить питомца</h2>
        <p>Вы уверены, что хотите удалить питомца <strong>{{ pet.name }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <button type="submit" class="btn btn-danger">Удалить</button>
                <a href="{% url 'pet-list' %}" class="btn btn-outline">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
