{% extends 'base.html' %}

{% block title %}Удалить услугу — PetCare{% endblock %}

{% block content %}
<section class="section">
    <div class="form-section">
        <h2>Удалить услугу?</h2>
        <p>Вы собираетесь удалить услугу <strong>«{{ service.name }}»</strong>. Это действие нельзя отменить.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-row">
                <button type="submit" class="btn btn-primary" style="background:#dc2626;border-color:#dc2626;">Удалить</button>
                <a href="{% url 'service-detail' service.pk %}" class="btn btn-outline">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
